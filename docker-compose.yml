version: "3.9"

services:
  postgres:
    image: postgres:18-alpine
    container_name: geekdesign_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: geekdesign
      POSTGRES_PASSWORD: geekdesign_dev
      POSTGRES_DB: geekdesign
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
