name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
      - "test/**"
  pull_request:
    branches:
      - main
      - develop

defaults:
  run:
    working-directory: portal-geek

jobs:
  # ── Fast feedback — runs on every push and PR ────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portal-geek/package-lock.json
      - run: npm ci
      - run: npm run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portal-geek/package-lock.json
      - run: npm ci
      - run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portal-geek/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portal-geek/package-lock.json
      - run: npm ci
      - run: npm test -- --passWithNoTests --ci

  # ── Heavier checks — only on PRs to main or develop ─────────────────────────

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, format, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portal-geek/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          # Dummy value so Next.js build doesn't fail on missing env
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

  links:
    name: Link Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Run independently — don't block on code checks
    steps:
      - uses: actions/checkout@v4
      - name: Check links in markdown files
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --exclude-loopback
            --exclude-mail
            --exclude "^https?://localhost"
            "**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
